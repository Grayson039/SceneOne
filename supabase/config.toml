# SceneOne — Supabase project config.
# Per-function settings the CLI applies on `supabase functions deploy`.
project_id = "zzsjgaijrngxkaqakplm"

# grade-script handles both anonymous sample calls (no JWT) and logged-in users.
# verify_jwt = false so anonymous demo calls aren't rejected at the gateway.
# The function manually calls auth.getUser() to identify logged-in users.
# Plan enforcement happens server-side regardless of login state.
[functions.grade-script]
verify_jwt = false

# create-checkout and create-portal require a signed-in user — they verify the
# JWT manually via auth.getUser() and return 401 if no valid session is found.
# Supabase's built-in verify_jwt is left false because the anon key sent by the
# browser (via functions.invoke) is technically a valid JWT even for anon users,
# which would allow unauthenticated callers through the gateway check.
# Manual auth.getUser() is the correct approach here.
[functions.create-checkout]
verify_jwt = false

[functions.create-portal]
verify_jwt = false

# Stripe calls this directly with NO Supabase JWT — it authenticates instead by
# verifying Stripe's signature header. JWT verification MUST be off or Stripe
# webhooks get rejected with 401.
[functions.stripe-webhook]
verify_jwt = false
