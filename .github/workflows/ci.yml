name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --save-dev eslint@9 @eslint/js htmlhint

      - name: Lint HTML files
        run: npx htmlhint landing.html index.html admin.html reset-password.html --config .htmlhintrc || true

      - name: Check for secrets accidentally committed
        run: |
          # Fail if a raw Supabase service role key is committed
          if grep -r "service_role" --include="*.html" --include="*.js" --include="*.ts" .; then
            echo "ERROR: Possible service role key found in source files"
            exit 1
          fi

      - name: Lint TypeScript edge functions
        run: |
          npm install --save-dev typescript
          npx tsc --noEmit --allowJs --checkJs false \
            --moduleResolution bundler --target esnext \
            --lib esnext,dom \
            supabase/functions/grade-script/index.ts \
            supabase/functions/create-checkout/index.ts \
            supabase/functions/create-portal/index.ts \
            supabase/functions/stripe-webhook/index.ts \
            2>&1 | head -50 || true
